name: Akordio

version: "3.9"

services:
  frontend:
    build:
      context: ./Frontend/Akordio_frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      - VITE_API_BASE_URL=http://backend:5000
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend 
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run
      - FLASK_ENV=development
    volumes:
      - ./Backend:/akordio